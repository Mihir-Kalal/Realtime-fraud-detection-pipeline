

services:
  redis:
    image: redis:7.2-alpine
    container_name: fraud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: fraud-postgres
    environment:
      POSTGRES_DB: frauddb
      POSTGRES_USER: frauduser
      POSTGRES_PASSWORD: fraudpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frauduser -d frauddb"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fraud-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: fraud-mlflow
    command: >
      sh -c "pip install psycopg2-binary && mlflow server
      --backend-store-uri postgresql://frauduser:fraudpass@postgres:5432/frauddb
      --default-artifact-root /mlruns
      --host 0.0.0.0
      --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlruns
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 10s
      timeout: 5s
      retries: 10

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: fraud-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      EVENTS_PER_SECOND: 5
      FRAUD_RATE: 0.05
      NUM_SYNTHETIC_USERS: 200
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  feature_engine:
    build:
      context: .
      dockerfile: feature_engine/Dockerfile
    container_name: fraud-feature-engine
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      POSTGRES_DSN: "postgresql://frauduser:fraudpass@postgres:5432/frauddb"
      CONSUMER_INDEX: 1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  serving:
    build:
      context: .
      dockerfile: serving/Dockerfile
    container_name: fraud-scoring-api
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: "postgresql://frauduser:fraudpass@postgres:5432/frauddb"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_RELOAD_POLL_SECONDS: "30"
      ADMIN_TOKEN: "admin_secret_token"
      AB_SPLIT_PERCENTAGE: "50"
      SCORING_MODE: "ab_test"
      POSTGRES_POOL_MIN_SIZE: "2"
      POSTGRES_POOL_MAX_SIZE: "10"
      REDIS_MAX_CONNECTIONS: "1000"
      ASYNC_DB_WRITE: "true"
    ports:
      - "8000:8000"
    volumes:
      - mlflow_artifacts:/mlruns
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    restart: unless-stopped

  feedback:
    build:
      context: .
      dockerfile: feedback/Dockerfile
    container_name: fraud-feedback
    environment:
      POSTGRES_DSN: postgresql://frauduser:fraudpass@postgres:5432/frauddb
      LABEL_DELAY_MIN_HOURS: "0.01"
      LABEL_DELAY_MAX_HOURS: "0.05"
      FEEDBACK_POLL_INTERVAL_SECONDS: "30"
      SIMULATED_BASE_FRAUD_RATE: "0.02"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  monitoring:
    build:
      context: .
      dockerfile: monitoring/Dockerfile
    container_name: fraud-monitoring
    environment:
      POSTGRES_DSN: postgresql://frauduser:fraudpass@postgres:5432/frauddb
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DRIFT_CHECK_INTERVAL_SECONDS: "300"
      DRIFT_LIVE_WINDOW_HOURS: "6"
      DRIFT_BASELINE_WINDOW_HOURS: "72"
      DRIFT_PSI_THRESHOLD: "0.25"
      DRIFT_RETRAIN_COOLDOWN_MINUTES: "60"
      DRIFT_MIN_LIVE_ROWS: "200"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    volumes:
      - mlflow_artifacts:/mlruns
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: monitoring/Dockerfile
    container_name: fraud-dashboard
    environment:
      POSTGRES_DSN: postgresql://frauduser:fraudpass@postgres:5432/frauddb
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: ["streamlit", "run", "monitoring/dashboard.py", "--server.port", "8501", "--server.address", "0.0.0.0"]

  training:
    build:
      context: .
      dockerfile: training/Dockerfile
    container_name: fraud-training
    environment:
      POSTGRES_DSN: postgresql://frauduser:fraudpass@postgres:5432/frauddb
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MIN_LABELED_ROWS: "200"
    volumes:
      - mlflow_artifacts:/mlruns
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  locust:
    image: locustio/locust
    container_name: fraud-locust
    ports:
      - "8089:8089"
    volumes:
      - ./tests/load:/mnt/locust
    command: -f /mnt/locust/locustfile.py --host http://serving:8000
    depends_on:
      - serving

  neo4j:
    image: neo4j:5.20.0
    container_name: fraud-neo4j
    environment:
      NEO4J_AUTH: neo4j/fraudpass
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10


volumes:
  redis_data:
  postgres_data:
  mlflow_artifacts:
  neo4j_data:
